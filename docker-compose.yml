services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sip_db
      POSTGRES_USER: sip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sip_password_2025}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sip -d sip_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3005}:3000"
    environment:
      DATABASE_URL: "postgresql://sip:${POSTGRES_PASSWORD:-sip_password_2025}@db:5432/sip_db"
      AUTH_SECRET: "${AUTH_SECRET:-sip-elact-production-secret-2025}"
      AUTH_URL: "${AUTH_URL:-https://sip.mv}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-https://sip.mv}"
      AUTH_TRUST_HOST: "true"
    volumes:
      - uploads:/app/public/uploads
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # Primary domain: sip.mv
      - "traefik.http.routers.sip.rule=Host(`sip.mv`) || Host(`elact.thecrayfish.tech`)"
      - "traefik.http.routers.sip.entrypoints=websecure"
      - "traefik.http.routers.sip.tls.certresolver=letsencrypt"
      - "traefik.http.services.sip.loadbalancer.server.port=3000"
      # HTTP -> HTTPS redirect for both domains
      - "traefik.http.routers.sip-http.rule=Host(`sip.mv`) || Host(`elact.thecrayfish.tech`)"
      - "traefik.http.routers.sip-http.entrypoints=web"
      - "traefik.http.routers.sip-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

networks:
  dokploy-network:
    external: true

volumes:
  postgres_data:
  uploads:
